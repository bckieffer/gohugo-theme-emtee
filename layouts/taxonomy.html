{{ define "main" }}
<section class="archive">
  <h1>{{ .Title }}</h1>
  <ul class="taxonomy-list">
    {{ range .Data.Terms.Alphabetical }}
    <li>
      <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a>
      <span class="post-count">({{ .Count }})</span>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
