<aside class="sidebar" aria-label="Site navigation">
  <nav class="sidebar-nav">
    <section>
      <h2 class="sidebar-heading">Feed</h2>
      <ul>
        <li><a href="{{ absURL "index.xml" }}" rel="alternate" type="application/rss+xml">RSS feed</a></li>
      </ul>
    </section>
    <section>
      <h2 class="sidebar-heading">Recent Posts</h2>
      <ul>
        {{ range first 5 (where site.RegularPages "Section" "posts") }}
          <li><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
        {{ end }}
      </ul>
    </section>
    {{ with site.Taxonomies.tags }}
    <section>
      <h2 class="sidebar-heading">Tags</h2>
      <ul>
        {{ range $name, $pages := . }}
          <li><a href="{{ (site.GetPage (printf "/tags/%s" $name)).RelPermalink }}">{{ $name }}</a></li>
        {{ end }}
      </ul>
    </section>
    {{ end }}
  </nav>
</aside>
